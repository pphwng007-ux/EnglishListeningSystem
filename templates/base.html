<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}English Listening System{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block styles %}{% endblock %}
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{{ url_for('dashboard') }}">
            <span class="brand-mark">EL</span>
            <span>English Listening</span>
        </a>

        <nav class="nav">
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('lessons') }}">Bai nghe</a>
            <a href="{{ url_for('practice_default') }}">Luyen tap</a>
            <a href="{{ url_for('history') }}">Lich su</a>
        </nav>
    </header>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/progress.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
